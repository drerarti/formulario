<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login Agente</title>
  <style>
 body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#111,#2b2b2b);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:92%;
  max-width:380px;
  background:white;
  padding:28px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

h3{
  margin-top:0;
  text-align:center;
  font-size:22px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  margin-top:15px;
  width:100%;
  padding:14px;
  background:#1b5e20;
  color:white;
  border:none;
  font-size:16px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}
  </style>
</head>
<body>

<div class="card">
<h2 style="text-align:center;margin-bottom:10px;">
AYLLU
</h2>
<h3>Ingreso Agente</h3>

<input 
id="codigo"
placeholder="codigo agente (ej: ag01)"
autocomplete="off"
autocapitalize="off"
spellcheck="false"
/>

<button onclick="login()">
Ingresar
</button>

</div>

<script>
async function login() {
  const codigo = document.getElementById("codigo").value
  .trim()
  .toLowerCase();

  if (!codigo) return alert("Ingrese código");

  const res = await fetch(
    `/.netlify/functions/airtable?validar_agente=1&codigo=${codigo}`
  );

  const data = await res.json();

  if (!data.valido) {
    alert("Código inválido");
    return;
  }

  localStorage.setItem("auth_token", data.token);

// Decodificar JWT
function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(
    atob(base64)
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  );
  return JSON.parse(jsonPayload);
}

const decoded = parseJwt(data.token);

// Redirección según rol
if (decoded.rol === "admin") {
  window.location.href = "/admin.html";
} else {
  window.location.href = "/dashboard-agente.html";
}
}
document
.getElementById("codigo")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});
</script>

</body>
</html>
